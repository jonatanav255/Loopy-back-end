spring:
  application:
    name: loopy-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-256-bits-long!!}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:2592000000}
