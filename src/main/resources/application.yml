spring:
  application:
    name: loopy-backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-256-bits-long!!}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:2592000000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  generation-model: ${ANTHROPIC_GENERATION_MODEL:claude-haiku-4-5-20251001}
  evaluation-model: ${ANTHROPIC_EVALUATION_MODEL:claude-sonnet-4-5-20250514}
