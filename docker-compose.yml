services:
  postgres:
    image: postgres:16-alpine
    container_name: loopy-postgres
    environment:
      POSTGRES_DB: loopy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - loopy_pgdata:/var/lib/postgresql/data

volumes:
  loopy_pgdata:
